name: 予約投稿実行

on:
  schedule:
    - cron: '*/15 * * * *'  # 15分毎
  workflow_dispatch:          # 手動実行も可能

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: 予約投稿を実行
        run: |
          curl -s -X GET "${{ secrets.APP_URL }}/api/cron/publish-scheduled" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -w "\nHTTP Status: %{http_code}\n"
